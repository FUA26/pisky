pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "*.{js,jsx,ts,tsx,json,css,md}"
      run: npx prettier --write {staged_files}
      stage_fixed: true

commit-msg:
  parallel: false
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    type-check:
      run: npx tsc --noEmit
    lint:
      run: pnpm run lint
